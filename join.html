<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join AeroDrone – Become a certified drone pilot or client member">
    <title>AeroDrone | Join the Fleet</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✈️%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        blackMain: '#0B0B0B',
                        whiteMain: '#F5F5F5',
                        lightBlue: '#4a9eff',
                        darkBlue: '#1e2a3a',
                    }
                }
            }
        };
    </script>
    <style>
        /* ----- EXACT SAME VARIABLES AS INDEX.HTML ----- */
        :root {
            /* Light mode */
            --bg-primary: #FFFFFF;
            --bg-secondary: #f0f7ff;
            --text-main: #000000;
            --text-muted: #1e2a3a;
            --card-bg: #FFFFFF;
            --border-subtle: #b8d1f0;
            --accent-lightblue: #4a9eff;
            --navbar-bg: #FFFFFF;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --light-blue: #d4e6ff;
            --btn-hover-bg: #000000;
            --btn-hover-text: #FFFFFF;
        }
        [data-theme="dark"] {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --text-main: #FFFFFF;
            --text-muted: #b0c7e9;
            --card-bg: #1a2332;
            --border-subtle: #2d3a52;
            --accent-lightblue: #6eb0ff;
            --navbar-bg: #0a0f1a;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --light-blue: #1e2a3a;
            --btn-hover-bg: #FFFFFF;
            --btn-hover-text: #0a0f1a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem; 
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* ----- EXACT SAME LOGO STYLES AS INDEX.HTML (FIXED VISIBILITY) ----- */
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .logo:hover { opacity: 0.8; }
        .logo-icon {
            width: 3rem;
            height: 3rem;
            background-color: var(--bg-primary);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-lightblue);
        }
        .logo-icon i { color: var(--accent-lightblue); font-size: 2rem; }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }
        .logo-text span { color: var(--accent-lightblue); }
        .logo-tagline {
            font-size: 0.625rem;
            color: var(--text-muted);
            display: block;
            margin-top: -0.25rem;
            font-weight: 500;
        }
        
        /* Mobile logo size adjustment - EXACT SAME STYLE */
        .logo-mobile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .logo-icon-mobile {
            width: 2.5rem;
            height: 2.5rem;
            background-color: var(--bg-primary);
            border-radius: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-lightblue);
        }
        .logo-icon-mobile i { color: var(--accent-lightblue); font-size: 1.5rem; }
        .logo-text-mobile {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }
        .logo-text-mobile span { color: var(--accent-lightblue); }
        .logo-tagline-mobile {
            font-size: 0.5rem;
            color: var(--text-muted);
            display: block;
            margin-top: -0.2rem;
            font-weight: 500;
        }
        
        /* Left side logo for dark background - white text for visibility */
        .logo-sidebar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .logo-sidebar:hover { opacity: 0.8; }
        .logo-icon-sidebar {
            width: 3rem;
            height: 3rem;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-lightblue);
        }
        .logo-icon-sidebar i { color: var(--accent-lightblue); font-size: 2rem; }
        .logo-text-sidebar {
            font-size: 1.5rem;
            font-weight: 900;
            color: #FFFFFF;
            letter-spacing: -0.02em;
        }
        .logo-text-sidebar span { color: var(--accent-lightblue); }
        .logo-tagline-sidebar {
            font-size: 0.625rem;
            color: rgba(255, 255, 255, 0.7);
            display: block;
            margin-top: -0.25rem;
            font-weight: 500;
        }
        
        /* Auth Card Styles */
        .auth-card { 
            background-color: var(--card-bg); 
            border: 1px solid var(--accent-lightblue); 
            box-shadow: 0 25px 50px -12px rgba(74, 158, 255, 0.2); 
            width: 100%; 
            max-width: 1000px; 
            border-radius: 1.5rem; 
            overflow: hidden; 
        }
        
        .control-bubble { 
            background-color: var(--card-bg); 
            border: 1px solid var(--accent-lightblue); 
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            cursor: pointer; 
            color: var(--text-main);
            transition: all 0.2s;
        }
        .control-bubble:hover {
            background-color: var(--accent-lightblue);
            color: var(--pure-white);
        }
        
        .input-field { 
            background-color: transparent; 
            border: 1px solid var(--border-subtle); 
            color: var(--text-main); 
            padding: 0.75rem 1rem; 
            width: 100%; 
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        .input-field:focus { 
            border-color: var(--accent-lightblue); 
            outline: none;
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.2);
        }
        .input-field::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }
        
        .btn-primary { 
            background: var(--accent-lightblue); 
            color: var(--pure-white); 
            padding: 0.85rem; 
            width: 100%; 
            border-radius: 9999px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            font-size: 0.75rem;
            border: 1px solid var(--accent-lightblue);
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: transparent;
            color: var(--text-main);
            border-color: var(--text-main);
        }
        
        .social-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem; 
            padding: 0.6rem; 
            border: 1px solid var(--border-subtle); 
            border-radius: 9999px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            transition: 0.2s;
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
        }
        .social-btn:hover { 
            background-color: var(--accent-lightblue); 
            border-color: var(--accent-lightblue);
            color: var(--pure-white);
        }
        .social-btn:hover i {
            color: var(--pure-white);
        }
        
        /* RTL Support */
        html[dir="rtl"] .md\:flex-row { 
            flex-direction: row-reverse; 
        }
        html[dir="rtl"] .text-left { 
            text-align: right; 
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .toast-notification {
            animation: fadeInUp 0.3s ease-out;
        }
        
        /* Left side gradient overlay */
        .hero-gradient {
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%);
        }
    </style>
</head>
<body>

    <!-- Floating Control Buttons (RTL & Theme) -->
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleRTL()" class="control-bubble"><i class="fas fa-right-left"></i></button>
        <button onclick="toggleTheme()" class="control-bubble"><i class="fas fa-moon" id="themeIcon"></i></button>
    </div>

    <div class="auth-card flex flex-col md:flex-row">
        <!-- Left Side - Hero Section with Drone Image -->
        <div class="hidden md:flex md:w-5/12 relative min-h-[500px] overflow-hidden">
            <img src="https://images.unsplash.com/photo-1508614589041-895b88991e3e?q=80&w=2070&auto=format&fit=crop" 
                 class="absolute inset-0 w-full h-full object-cover"
                 alt="Drone aerial view">
            <div class="absolute inset-0 hero-gradient"></div>
            <div class="relative z-10 p-8 flex flex-col justify-between h-full w-full">
                <!-- SIDEBAR LOGO - White text for dark background -->
                <a href="index.html" class="logo-sidebar">
                    <div class="logo-icon-sidebar"><i class="fas fa-plane"></i></div>
                    <div>
                        <div class="logo-text-sidebar">Aero<span>Drone</span></div>
                        <span class="logo-tagline-sidebar">light blue horizon</span>
                    </div>
                </a>
                <div>
                    <h2 class="text-4xl font-black text-white leading-tight mb-4">Join The<br><span style="color: var(--accent-lightblue);" class="font-serif">Elite Fleet</span></h2>
                    <p class="text-sm text-white/80 mb-4">Become a certified pilot or access premium aerial intelligence services.</p>
                    <div class="flex gap-4">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-drone" style="color: var(--accent-lightblue);"></i>
                            <span class="text-xs text-white/70">FAA Certified</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fas fa-chart-line" style="color: var(--accent-lightblue);"></i>
                            <span class="text-xs text-white/70">2500+ Flights</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Signup Form (Friend's Structure) -->
        <div class="w-full md:w-7/12 p-6 lg:p-8 flex flex-col justify-center">
            <!-- Mobile Logo - EXACT SAME STYLE AS INDEX.HTML (visible in both modes) -->
            <a href="index.html" class="md:hidden flex items-center gap-3 mb-6 justify-center group">
                <div class="logo-icon-mobile"><i class="fas fa-plane"></i></div>
                <div class="text-left">
                    <div class="logo-text-mobile">Aero<span>Drone</span></div>
                    <span class="logo-tagline-mobile">light blue horizon</span>
                </div>
            </a>

            <div class="mb-6 text-center">
                <h3 class="text-2xl font-black" style="color: var(--text-main);">Create Your Identity</h3>
                <p class="text-[10px] opacity-50 uppercase tracking-widest mt-1" style="color: var(--text-muted);">
                    Enter The AeroDrone Experience
                </p>
            </div>

            <form onsubmit="handleAuth(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1" style="color: var(--text-muted);">First Name</label>
                        <input type="text" id="firstName" required class="input-field text-sm" placeholder="Alex">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1" style="color: var(--text-muted);">Last Name</label>
                        <input type="text" id="lastName" required class="input-field text-sm" placeholder="Johnson">
                    </div>
                </div>
                
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1" style="color: var(--text-muted);">Email</label>
                    <input type="email" id="email" required class="input-field text-sm" placeholder="pilot@aeroDrone.com">
                </div>
                
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1" style="color: var(--text-muted);">Password</label>
                    <input type="password" id="pass" required class="input-field text-sm" placeholder="••••••••">
                </div>
                
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest opacity-50 mb-1" style="color: var(--text-muted);">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPass" required class="input-field text-sm pr-10" placeholder="••••••••" oninput="checkPassMatch()">
                        <button type="button" onclick="togglePass(this)" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-40 hover:opacity-100 transition-all" style="color: var(--text-muted);">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                    <p id="matchMsg" class="text-[9px] mt-1 font-black tracking-widest uppercase"></p>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="termsCheckbox" class="w-3 h-3 rounded border-gray-300 accent-[#4a9eff]">
                        <span class="text-[10px] uppercase font-black tracking-tighter opacity-70 group-hover:opacity-100 transition-opacity" style="color: var(--text-muted);">
                            I Agree to Terms & Conditions
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn-primary shadow-lg mt-2">
                    <i class="fas fa-user-plus mr-2"></i> Create Account
                </button>
            </form>

            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t" style="border-color: var(--border-subtle);"></div>
                </div>
                <div class="relative flex justify-center text-[8px] uppercase font-black tracking-widest">
                    <span class="px-4" style="background-color: var(--card-bg); color: var(--text-muted);">Social Sign Up</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button type="button" class="social-btn" onclick="socialSignup('google')">
                    <i class="fab fa-google text-red-500"></i><span>Google</span>
                </button>
                <button type="button" class="social-btn" onclick="socialSignup('facebook')">
                    <i class="fab fa-facebook text-blue-600"></i><span>Facebook</span>
                </button>
                <button type="button" class="social-btn" onclick="socialSignup('apple')">
                    <i class="fab fa-apple"></i><span>Apple</span>
                </button>
            </div>
            
            <p class="mt-8 text-[10px] opacity-60 uppercase tracking-widest text-center" style="color: var(--text-muted);">
                Already Registered? <a href="login.html" class="font-black hover:underline" style="color: var(--accent-lightblue);">Login</a>
            </p>
        </div>
    </div>

    <script>
        // ==================== THEME TOGGLE (EXACT SAME AS INDEX.HTML) ====================
        const htmlElement = document.documentElement;
        
        function toggleTheme() {
            let currentTheme = htmlElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Update icon
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
        
        // Load saved theme
        let savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        const themeIconElement = document.getElementById('themeIcon');
        if (themeIconElement) {
            themeIconElement.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        
        // ==================== RTL TOGGLE (EXACT SAME AS INDEX.HTML) ====================
        function toggleRTL() {
            let currentDir = htmlElement.getAttribute('dir');
            let newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.setAttribute('dir', newDir);
            localStorage.setItem('direction', newDir);
        }
        
        // Load saved direction
        let savedDir = localStorage.getItem('direction');
        if (savedDir) {
            htmlElement.setAttribute('dir', savedDir);
        }
        
        // ==================== PASSWORD MATCH CHECK (FRIEND'S CODE STRUCTURE) ====================
        function checkPassMatch() {
            const pass = document.getElementById("pass").value;
            const confirm = document.getElementById("confirmPass").value;
            const msg = document.getElementById("matchMsg");
            
            if (confirm.length === 0) {
                msg.innerHTML = "";
                return;
            }
            
            if (pass === confirm) {
                msg.innerHTML = "✓ Passcodes Match";
                msg.style.color = "#10b981";
            } else {
                msg.innerHTML = "✗ Passcodes Do Not Match";
                msg.style.color = "#ef4444";
            }
        }
        
        // ==================== TOGGLE PASSWORD VISIBILITY (FRIEND'S CODE STRUCTURE) ====================
        function togglePass(button) {
            const input = button.parentElement.querySelector('input');
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash text-xs';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye text-xs';
            }
        }
        
        // ==================== FORM SUBMISSION HANDLER ====================
        async function handleAuth(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const termsCheckbox = document.getElementById('termsCheckbox');
            
            // Validation
            if (!firstName || !lastName || !email || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirmPass) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (!termsCheckbox.checked) {
                showToast('Please agree to Terms & Conditions', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Please enter a valid email address', 'error');
                return;
            }
            
            // Simulate registration
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Creating...';
            submitBtn.disabled = true;
            
            // Store user data in localStorage
            const users = JSON.parse(localStorage.getItem('aeroDrone_users') || '[]');
            const userExists = users.some(u => u.email === email);
            
            if (userExists) {
                showToast('Email already registered. Please login instead.', 'error');
                submitBtn.innerHTML = originalHTML;
                submitBtn.disabled = false;
                return;
            }
            
            // Save new user
            users.push({
                firstName,
                lastName,
                email,
                password: btoa(password),
                registeredAt: new Date().toISOString()
            });
            localStorage.setItem('aeroDrone_users', JSON.stringify(users));
            localStorage.setItem('aeroDrone_current_user', JSON.stringify({ firstName, lastName, email }));
            
            setTimeout(() => {
                showToast('Account created successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }, 800);
        }
        
        // ==================== SOCIAL SIGNUP ====================
        function socialSignup(provider) {
            showToast(`Sign up with ${provider} coming soon!`, 'success');
        }
        
        // ==================== TOAST NOTIFICATION ====================
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-notification fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full font-medium text-sm shadow-lg transition-all duration-300';
            toast.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.color = 'white';
            toast.style.zIndex = '10000';
            toast.style.whiteSpace = 'nowrap';
            toast.style.fontFamily = "'Inter', sans-serif";
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // Add focus styles for better UX
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = 'var(--accent-lightblue)';
            });
            input.addEventListener('blur', function() {
                this.style.borderColor = 'var(--border-subtle)';
            });
        });
        
        // Fix for auto-fill background
        const styleFix = document.createElement('style');
        styleFix.textContent = `
            input:-webkit-autofill,
            input:-webkit-autofill:focus {
                -webkit-text-fill-color: var(--text-main);
                -webkit-box-shadow: 0 0 0px 1000px var(--card-bg) inset;
                transition: background-color 5000s ease-in-out 0s;
            }
        `;
        document.head.appendChild(styleFix);
    </script>
</body>
</html>
