<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join AeroDrone – Become a certified drone pilot or client member">
    <title>AeroDrone | Join the Fleet</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E✈️%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        blackMain: '#0B0B0B',
                        whiteMain: '#F5F5F5',
                        lightBlue: '#4a9eff',
                        darkBlue: '#1e2a3a',
                    }
                }
            }
        };
    </script>
    <style>
        /* ----- VARIABLES ----- */
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #f0f7ff;
            --text-main: #000000;
            --text-muted: #1e2a3a;
            --card-bg: #FFFFFF;
            --border-subtle: #b8d1f0;
            --accent-lightblue: #4a9eff;
            --navbar-bg: #FFFFFF;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --light-blue: #d4e6ff;
            --btn-hover-bg: #000000;
            --btn-hover-text: #FFFFFF;
        }
        [data-theme="dark"] {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --text-main: #FFFFFF;
            --text-muted: #b0c7e9;
            --card-bg: #1a2332;
            --border-subtle: #2d3a52;
            --accent-lightblue: #6eb0ff;
            --navbar-bg: #0a0f1a;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --light-blue: #1e2a3a;
            --btn-hover-bg: #FFFFFF;
            --btn-hover-text: #0a0f1a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem; 
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }
        
        /* CENTERED CONTAINER - PERFECT CENTERING */
        .centered-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
        }
        
        /* TIGHTENED AUTH CARD - REMOVED EXCESS PADDING, CLEAN & NEAT */
        .auth-card { 
            background-color: var(--card-bg); 
            border: 1px solid var(--accent-lightblue); 
            box-shadow: 0 20px 40px -12px rgba(74, 158, 255, 0.15); 
            width: 100%; 
            max-width: 920px; 
            border-radius: 1.25rem; 
            overflow: hidden; 
            transition: all 0.3s ease;
        }
        
        /* TIGHTENED CONTENT PADDING */
        .right-content {
            padding: 1.75rem 2rem;
        }
        
        @media (max-width: 768px) {
            .right-content {
                padding: 1.5rem;
            }
            body {
                padding: 1rem;
            }
        }
        
        @media (max-width: 640px) {
            .right-content {
                padding: 1.25rem;
            }
        }
        
        .control-bubble { 
            background-color: var(--card-bg); 
            border: 1px solid var(--accent-lightblue); 
            width: 38px; 
            height: 38px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            cursor: pointer; 
            color: var(--text-main);
            transition: all 0.2s;
        }
        .control-bubble:hover {
            background-color: var(--accent-lightblue);
            color: var(--pure-white);
        }
        
        .input-field { 
            background-color: transparent; 
            border: 1px solid var(--border-subtle); 
            color: var(--text-main); 
            padding: 0.7rem 1rem; 
            width: 100%; 
            border-radius: 0.6rem;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .input-field:focus { 
            border-color: var(--accent-lightblue); 
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
        }
        .input-field::placeholder {
            color: var(--text-muted);
            opacity: 0.45;
            font-weight: 400;
            font-size: 0.85rem;
        }
        
        /* UNIFIED COMPACT LABEL STYLES - SAME SIZE, TIGHTENED */
        .form-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        
        .form-label i {
            margin-right: 0.3rem;
            font-size: 0.6rem;
            opacity: 0.8;
        }
        
        /* TIGHTENED FORM GROUP SPACING */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group:last-of-type {
            margin-bottom: 0.5rem;
        }
        
        .btn-primary { 
            background: var(--accent-lightblue); 
            color: var(--pure-white); 
            padding: 0.75rem; 
            width: 100%; 
            border-radius: 9999px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            font-size: 0.7rem;
            border: 1px solid var(--accent-lightblue);
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: transparent;
            color: var(--text-main);
            border-color: var(--text-main);
        }
        
        .social-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem; 
            padding: 0.55rem; 
            border: 1px solid var(--border-subtle); 
            border-radius: 9999px; 
            font-size: 0.65rem; 
            font-weight: 700; 
            transition: 0.2s;
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
        }
        .social-btn:hover { 
            background-color: var(--accent-lightblue); 
            border-color: var(--accent-lightblue);
            color: var(--pure-white);
        }
        .social-btn:hover i {
            color: var(--pure-white);
        }
        
        /* TIGHTENED HEADER SECTION */
        .auth-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .auth-header h3 {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        
        .auth-header p {
            font-size: 0.6rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 0.25rem;
        }
        
        /* PASSWORD TOGGLE */
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        
        .toggle-password {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            opacity: 0.55;
            transition: all 0.2s;
            font-size: 0.85rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-password:hover {
            opacity: 1;
            color: var(--accent-lightblue);
        }
        
        /* MATCH MESSAGE */
        .match-message {
            font-size: 0.6rem;
            font-weight: 800;
            margin-top: 0.35rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        
        /* LEFT SIDE STYLES - TIGHTENED */
        .hero-gradient {
            background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.3) 100%);
        }
        
        .logo-sidebar {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
        }
        .logo-icon-sidebar {
            width: 2.5rem;
            height: 2.5rem;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--accent-lightblue);
        }
        .logo-icon-sidebar i { color: var(--accent-lightblue); font-size: 1.5rem; }
        .logo-text-sidebar {
            font-size: 1.25rem;
            font-weight: 900;
            color: white;
            letter-spacing: -0.02em;
        }
        .logo-text-sidebar span { color: var(--accent-lightblue); }
        .logo-tagline-sidebar {
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.7);
            display: block;
            margin-top: -0.2rem;
            font-weight: 500;
        }
        
        /* Mobile logo */
        .logo-icon-mobile {
            width: 2.2rem;
            height: 2.2rem;
            background-color: var(--bg-primary);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid var(--accent-lightblue);
        }
        .logo-icon-mobile i { color: var(--accent-lightblue); font-size: 1.25rem; }
        .logo-text-mobile {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }
        .logo-text-mobile span { color: var(--accent-lightblue); }
        .logo-tagline-mobile {
            font-size: 0.45rem;
            color: var(--text-muted);
            display: block;
            margin-top: -0.2rem;
            font-weight: 500;
        }
        
        /* RTL Support */
        html[dir="rtl"] .md\:flex-row { 
            flex-direction: row-reverse; 
        }
        
        /* Toast animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .toast-notification {
            animation: fadeInUp 0.3s ease-out;
        }
        
        /* Tighten checkbox */
        .terms-checkbox {
            width: 0.9rem;
            height: 0.9rem;
            accent-color: var(--accent-lightblue);
        }
        
        /* Divider tightened */
        .divider {
            margin: 1.25rem 0;
        }
        
        /* Social buttons grid gap tightened */
        .social-grid {
            gap: 0.6rem;
        }
        
        /* Login link tightened */
        .login-link {
            margin-top: 1.5rem;
            font-size: 0.6rem;
        }
    </style>
</head>
<body>
    <!-- Floating Control Buttons -->
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleRTL()" class="control-bubble"><i class="fas fa-exchange-alt"></i></button>
        <button onclick="toggleTheme()" class="control-bubble"><i class="fas fa-moon" id="themeIcon"></i></button>
    </div>

    <div class="centered-container">
        <div class="auth-card flex flex-col md:flex-row">
            <!-- Left Side - Hero Section -->
            <div class="hidden md:flex md:w-5/12 relative min-h-[480px] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1508614589041-895b88991e3e?q=80&w=2070&auto=format&fit=crop" 
                     class="absolute inset-0 w-full h-full object-cover"
                     alt="Drone aerial view">
                <div class="absolute inset-0 hero-gradient"></div>
                <div class="relative z-10 p-6 flex flex-col justify-between h-full w-full">
                    <a href="index.html" class="logo-sidebar">
                        <div class="logo-icon-sidebar"><i class="fas fa-satellite"></i></div>
                        <div>
                            <div class="logo-text-sidebar">Aero<span>Drone</span></div>
                            <span class="logo-tagline-sidebar">Light Blue Horizon</span>
                        </div>
                    </a>
                    <div>
                        <h2 class="text-3xl font-black text-white leading-tight mb-3">Join The<br><span style="color: var(--accent-lightblue);">Elite Fleet</span></h2>
                        <p class="text-xs text-white/80 mb-3">Certified pilot or premium aerial intelligence.</p>
                        <div class="flex gap-3">
                            <div class="flex items-center gap-1.5">
                                <i class="fas fa-drone text-xs" style="color: var(--accent-lightblue);"></i>
                                <span class="text-[10px] text-white/70">FAA Certified</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <i class="fas fa-chart-line text-xs" style="color: var(--accent-lightblue);"></i>
                                <span class="text-[10px] text-white/70">2500+ Flights</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - TIGHTENED SIGNUP FORM -->
            <div class="w-full md:w-7/12 right-content flex flex-col justify-center">
                <!-- Mobile Logo -->
                <a href="index.html" class="md:hidden flex items-center gap-2 mb-5 justify-center">
                    <div class="logo-icon-mobile"><i class="fas fa-satellite"></i></div>
                    <div class="text-left">
                        <div class="logo-text-mobile">Aero<span>Drone</span></div>
                        <span class="logo-tagline-mobile">Light Blue Horizon</span>
                    </div>
                </a>

                <div class="auth-header">
                    <h3 style="color: var(--text-main);">Create Your Identity</h3>
                    <p style="color: var(--text-muted);">Enter The AeroDrone Experience</p>
                </div>

                <form onsubmit="handleAuth(event)">
                    <!-- FIRST NAME -->
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-user-circle"></i> FIRST NAME</label>
                        <input type="text" id="firstName" required class="input-field" placeholder="Alex" autocomplete="given-name">
                    </div>
                    
                    <!-- LAST NAME -->
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-user-tag"></i> LAST NAME</label>
                        <input type="text" id="lastName" required class="input-field" placeholder="Johnson" autocomplete="family-name">
                    </div>
                    
                    <!-- EMAIL -->
                    
                    
                    <!-- PASSWORD -->
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> PASSWORD</label>
                        <input type="password" id="pass" required class="input-field" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    
                    <!-- CONFIRM PASSWORD -->
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-shield-alt"></i> CONFIRM PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPass" required class="input-field pr-10" placeholder="••••••••" autocomplete="off" oninput="checkPassMatch()">
                            <button type="button" class="toggle-password" onclick="togglePass(this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div id="matchMsg" class="match-message"></div>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="form-group flex items-center justify-between pt-0">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input type="checkbox" id="termsCheckbox" class="terms-checkbox">
                            <span class="text-[0.6rem] uppercase font-black tracking-wider opacity-70 group-hover:opacity-100 transition-opacity" style="color: var(--text-muted);">
                                I agree to Terms & Conditions
                            </span>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-primary shadow-md mt-1">
                        <i class="fas fa-user-plus mr-2"></i> Create Account
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t" style="border-color: var(--border-subtle);"></div>
                    </div>
                    <div class="relative flex justify-center text-[0.6rem] uppercase font-black tracking-widest">
                        <span class="px-3" style="background-color: var(--card-bg); color: var(--text-muted);">Social Sign Up</span>
                    </div>
                </div>

                <!-- Social Buttons -->
                <div class="grid grid-cols-3 social-grid">
                    <button type="button" class="social-btn" onclick="socialSignup('google')">
                        <i class="fab fa-google text-red-500 text-xs"></i><span class="text-[0.6rem]">Google</span>
                    </button>
                    <button type="button" class="social-btn" onclick="socialSignup('facebook')">
                        <i class="fab fa-facebook text-blue-600 text-xs"></i><span class="text-[0.6rem]">Facebook</span>
                    </button>
                    <button type="button" class="social-btn" onclick="socialSignup('apple')">
                        <i class="fab fa-apple text-xs"></i><span class="text-[0.6rem]">Apple</span>
                    </button>
                </div>
                
                <!-- Login Link -->
                <p class="login-link text-center opacity-60 uppercase tracking-widest" style="color: var(--text-muted);">
                    Already Registered? <a href="login.html" class="font-black hover:underline" style="color: var(--accent-lightblue);">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // ==================== THEME TOGGLE ====================
        const htmlElement = document.documentElement;
        
        function toggleTheme() {
            let currentTheme = htmlElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
        
        let savedTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', savedTheme);
        const themeIconElement = document.getElementById('themeIcon');
        if (themeIconElement) {
            themeIconElement.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        
        // ==================== RTL TOGGLE ====================
        function toggleRTL() {
            let currentDir = htmlElement.getAttribute('dir');
            let newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.setAttribute('dir', newDir);
            localStorage.setItem('direction', newDir);
        }
        
        let savedDir = localStorage.getItem('direction');
        if (savedDir) {
            htmlElement.setAttribute('dir', savedDir);
        }
        
        // ==================== PASSWORD MATCH ====================
        function checkPassMatch() {
            const pass = document.getElementById("pass").value;
            const confirm = document.getElementById("confirmPass").value;
            const msg = document.getElementById("matchMsg");
            
            if (confirm.length === 0) {
                msg.innerHTML = "";
                return;
            }
            
            if (pass === confirm && pass.length > 0) {
                msg.innerHTML = "✓ PASSCODES MATCH";
                msg.style.color = "#10b981";
            } else {
                msg.innerHTML = "✗ PASSCODES DO NOT MATCH";
                msg.style.color = "#ef4444";
            }
        }
        
        // ==================== TOGGLE PASSWORD ====================
        function togglePass(button) {
            const wrapper = button.parentElement;
            const input = wrapper.querySelector('input');
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
        
        // ==================== TOAST ====================
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast-notification');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-notification fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 px-5 py-2.5 rounded-full font-semibold text-xs shadow-lg transition-all duration-300';
            toast.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.color = 'white';
            toast.style.zIndex = '10000';
            toast.style.whiteSpace = 'nowrap';
            toast.style.fontFamily = "'Inter', sans-serif";
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ==================== FORM SUBMIT ====================
        async function handleAuth(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const termsCheckbox = document.getElementById('termsCheckbox');
            
            if (!firstName || !lastName || !email || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirmPass) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (!termsCheckbox.checked) {
                showToast('Please agree to Terms & Conditions', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Please enter a valid email address', 'error');
                return;
            }
            
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Creating...';
            submitBtn.disabled = true;
            
            const users = JSON.parse(localStorage.getItem('aeroDrone_users') || '[]');
            const userExists = users.some(u => u.email === email);
            
            if (userExists) {
                showToast('Email already registered. Please login instead.', 'error');
                submitBtn.innerHTML = originalHTML;
                submitBtn.disabled = false;
                return;
            }
            
            users.push({
                firstName,
                lastName,
                email,
                password: btoa(password),
                registeredAt: new Date().toISOString()
            });
            localStorage.setItem('aeroDrone_users', JSON.stringify(users));
            localStorage.setItem('aeroDrone_current_user', JSON.stringify({ firstName, lastName, email }));
            
            setTimeout(() => {
                showToast('Account created successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }, 800);
        }
        
        function socialSignup(provider) {
            showToast(`Sign up with ${provider} coming soon!`, 'success');
        }
        
        // Input focus styles
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = 'var(--accent-lightblue)';
            });
            input.addEventListener('blur', function() {
                this.style.borderColor = 'var(--border-subtle)';
            });
        });
        
        // Auto-fill fix
        const styleFix = document.createElement('style');
        styleFix.textContent = `
            input:-webkit-autofill,
            input:-webkit-autofill:focus {
                -webkit-text-fill-color: var(--text-main);
                -webkit-box-shadow: 0 0 0px 1000px var(--card-bg) inset;
            }
        `;
        document.head.appendChild(styleFix);
    </script>
</body>
